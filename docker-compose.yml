version: '3.8'

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-agritech}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agritech_pass_2024}
      POSTGRES_DB: ${DB_DATABASE:-agritech_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-agritech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS Backend ───
  backend:
    build:
      context: ./agritech-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-agritech}
      DB_PASSWORD: ${DB_PASSWORD:-agritech_pass_2024}
      DB_DATABASE: ${DB_DATABASE:-agritech_db}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-to-a-secure-random-string}
      PORT: 3000
    ports:
      - "3000:3000"

  # ─── React Frontend (Nginx) ───
  frontend:
    build:
      context: ./agritech-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
    driver: local
